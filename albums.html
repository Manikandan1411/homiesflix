<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOMIEFLIX — Albums</title>
  <meta name="description" content="Browse all your memory albums on HOMIEFLIX. 20 cinematic albums with photos and videos." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/homieflix.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    /* ===== ALBUMS PAGE STYLES ===== */
    .albums-page { background: var(--hf-bg); }

    .albums-hero {
      min-height: 45vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 2rem 3rem;
      position: relative;
    }
    .albums-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(229,9,20,0.12), transparent 65%);
    }
    .albums-hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--hf-red);
      font-weight: 700;
      margin-bottom: 1rem;
      position: relative;
    }
    .albums-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 8rem);
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 0 60px rgba(229,9,20,0.4);
      margin-bottom: 0.5rem;
      position: relative;
    }
    .albums-hero h1 span { color: var(--hf-red); }
    .albums-hero p {
      font-size: 1rem;
      color: var(--hf-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
    }

    /* ===== STATS BAR ===== */
    .albums-stats {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
      padding: 1.5rem 3rem;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--hf-red);
      letter-spacing: 0.05em;
    }
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--hf-muted);
      text-transform: uppercase;
    }

    /* ===== ALBUMS GRID ===== */
    .albums-grid-section {
      padding: 3rem 3rem 5rem;
    }
    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .album-grid-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 16/9;
      background: var(--hf-surface2);
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
      transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.4s;
    }
    .album-grid-card:hover {
      transform: scale(1.04) translateY(-6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(229,9,20,0.15);
    }
    .album-grid-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }
    .album-grid-card:hover img { transform: scale(1.08); }
    .album-grid-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.2rem;
      transition: background 0.3s;
    }
    .album-grid-card:hover .album-grid-overlay {
      background: linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.5) 50%, rgba(229,9,20,0.1) 100%);
    }
    .album-num {
      font-family: var(--font-display);
      font-size: 3rem;
      color: rgba(229,9,20,0.25);
      line-height: 1;
      margin-bottom: 0.2rem;
    }
    .album-grid-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }
    .album-grid-meta {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      font-size: 0.7rem;
      color: var(--hf-muted);
      margin-bottom: 0.8rem;
    }
    .album-grid-meta span {
      background: rgba(255,255,255,0.1);
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
    }
    .album-grid-btns {
      display: flex;
      gap: 0.6rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
    }
    .album-grid-card:hover .album-grid-btns {
      opacity: 1;
      transform: translateY(0);
    }
    .album-btn-play {
      background: #fff;
      color: #000;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-body);
      transition: background 0.2s;
    }
    .album-btn-play:hover { background: rgba(255,255,255,0.85); }
    .album-btn-info {
      background: rgba(109,109,110,0.7);
      color: #fff;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-body);
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .album-btn-info:hover { background: rgba(109,109,110,0.9); }
    .album-play-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 54px; height: 54px;
      background: rgba(229,9,20,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s, background 0.2s;
      box-shadow: 0 4px 20px rgba(229,9,20,0.5);
    }
    .album-grid-card:hover .album-play-icon { opacity: 1; }
    .album-play-icon:hover { background: var(--hf-red); }

    /* ===== SEARCH & FILTER ===== */
    .albums-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem 0;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .albums-section-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: #fff;
    }
    .albums-section-title span { color: var(--hf-red); }
    .albums-search {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      width: 240px;
      font-family: var(--font-body);
      transition: all 0.3s;
    }
    .albums-search:focus { outline: none; border-color: var(--hf-red); background: rgba(255,255,255,0.12); }
    .albums-search::placeholder { color: var(--hf-muted); }

    /* ===== PAGE FOOTER ===== */
    .albums-footer {
      text-align: center;
      padding: 3rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .albums-footer p { color: var(--hf-muted); font-size: 0.85rem; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .albums-grid-section { padding: 2rem 1.5rem 4rem; }
      .albums-toolbar { padding: 1.5rem 1.5rem 0; }
      .albums-stats { gap: 1.5rem; padding: 1rem; }
      .albums-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
      .albums-search { width: 100%; }
    }
  </style>
</head>

<body class="albums-page">

  <!-- NAVBAR -->
  <nav class="hf-navbar scrolled">
    <div class="hf-logo"><a href="index.html" style="text-decoration:none;color:inherit;">HOMIEFLIX</a></div>
    <div class="hf-nav-links">
      <a href="index.html">Home</a>
      <a href="albums.html" class="active">Albums</a>
      <a href="timeline.html">Timeline</a>
      <a href="signatures.html">Signatures</a>
    </div>
    <div class="hf-nav-right">
      <input type="text" id="albumSearchInput" placeholder="🔍 Search albums..." class="hf-search" oninput="filterAlbums(this.value)" />
      <div class="hf-avatar">H</div>
    </div>
  </nav>

  <!-- ALBUMS HERO -->
  <div class="albums-hero">
    <div class="albums-hero-eyebrow">🎬 HOMIEFLIX ORIGINALS</div>
    <h1>MEMORY <span>ALBUMS</span></h1>
    <p>Your story. Your way. 20 cinematic collections.</p>
  </div>

  <!-- STATS BAR -->
  <div class="albums-stats">
    <div class="stat-item">
      <div class="stat-num">20</div>
      <div class="stat-label">Albums</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">400</div>
      <div class="stat-label">Photos</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">200</div>
      <div class="stat-label">Video Clips</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">600</div>
      <div class="stat-label">Memories</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="albums-toolbar" data-aos="fade-up">
    <div class="albums-section-title">ALL <span>COLLECTIONS</span></div>
  </div>

  <!-- ALBUMS GRID -->
  <div class="albums-grid-section">
    <div class="albums-grid" id="albumsGrid" data-aos="fade-up" data-aos-delay="100">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- FOOTER -->
  <div class="albums-footer">
    <p>✨ Each album is a chapter of your story. Never stop collecting memories.</p>
  </div>

  <!-- MEMORY DETAIL MODAL -->
  <div class="hf-modal" id="memoryModal">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-content-hf" id="modalContent">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-poster-wrap">
        <img id="modalPoster" src="" alt="" />
        <div class="modal-poster-overlay"></div>
      </div>
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <div class="modal-meta">
          <span id="modalYear"></span>
          <span id="modalDuration"></span>
          <span class="modal-match">❤️ 98% Match</span>
        </div>
        <div class="modal-tags" id="modalTags"></div>
        <p id="modalDesc"></p>
        <div class="modal-btns">
          <button class="btn-play" id="modalPlayBtn">▶ Play Memories</button>
          <button class="btn-list" id="modalListBtn" onclick="toggleFavorite()">+ My List</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SURPRISE MODAL -->
  <div class="surprise-modal" id="surpriseModal">
    <div class="surprise-content" id="surpriseContent"></div>
  </div>

  <!-- FULLSCREEN PLAYER -->
  <div class="hf-player" id="playerOverlay" style="display:none">
    <div class="player-bg" id="playerBg"></div>
    <div class="player-overlay-dark"></div>
    <div class="player-content">
      <div class="player-slide active" id="currentSlide">
        <img id="playerImg" src="" alt="" style="display:none" />
        <video id="playerVid" playsinline></video>
        <div class="slide-caption" id="slideCaption"></div>
      </div>
    </div>
    <div class="player-controls">
      <div class="player-title-bar">
        <span id="playerTitle"></span>
        <span id="playerCounter"></span>
      </div>
      <div class="player-progress-wrap">
        <div class="player-progress-bar">
          <div class="player-progress-fill" id="playerFill"></div>
        </div>
      </div>
      <div class="player-btns">
        <button onclick="prevSlide()">⏮</button>
        <button id="playPauseBtn" onclick="togglePlay()">⏸</button>
        <button onclick="nextSlide()">⏭</button>
        <div class="vol-wrap">
          <span>🔊</span>
          <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.5" oninput="setVolume(this.value)" />
        </div>
        <button class="exit-btn" onclick="exitPlayer()">✕ Exit</button>
      </div>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="assets/music/ambient.mp3" type="audio/mp3" />
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="data/memories.js"></script>
  <script>
    // ===== ALBUMS PAGE JS =====
    AOS.init({ duration: 700, once: true, easing: 'ease-out-cubic' });

    let currentMemoryId = null;
    let favorites = JSON.parse(localStorage.getItem('hf_favorites') || '[]');
    let playerState = { playing: false, index: 0, slides: [], interval: null, memory: null };

    // ===== INIT =====
    window.addEventListener('load', async () => {
      if (typeof initMemoriesData === 'function') {
        await initMemoriesData();
      }
      renderAlbumsGrid(MEMORIES);
      initNavbarScroll();
    });

    function initNavbarScroll() {
      const nav = document.querySelector('.hf-navbar');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 60);
      });
    }

    // ===== RENDER GRID =====
    function renderAlbumsGrid(albums) {
      const grid = document.getElementById('albumsGrid');
      if (!grid) return;
      grid.innerHTML = albums.map((m, idx) => `
        <div class="album-grid-card" 
             data-aos="fade-up" 
             data-aos-delay="${(idx % 5) * 80}" 
             id="album-card-${m.id}"
             onclick="openAlbum(${m.id})"
             style="cursor:pointer;">
          <img src="${m.poster}" alt="${m.title}" loading="lazy" />
          <div class="album-grid-overlay">
            <div class="album-num">${String(idx + 1).padStart(2, '0')}</div>
            <div class="album-grid-title">${m.title}</div>
            <div class="album-grid-meta">
              <span id="count-badge-${m.id}">📸 Tap to open</span>
            </div>
            <div class="album-grid-btns">
              <button class="album-btn-play" onclick="event.stopPropagation();openAlbum(${m.id})">📂 Open Album</button>
              <button class="album-btn-info" onclick="event.stopPropagation();openMemory(${m.id})">ℹ Info</button>
            </div>
          </div>
        </div>
      `).join('');

      // Load counts from IndexedDB for each album
      loadAlbumCounts(albums);
    }

    function openAlbum(id) {
      window.location.href = `album-detail.html?id=${id}`;
    }

    // Read media counts from IndexedDB and update badges
    function loadAlbumCounts(albums) {
      const req = indexedDB.open('HomieflixMedia', 1);
      req.onsuccess = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('media')) return;
        const tx = db.transaction('media', 'readonly');
        const index = tx.objectStore('media').index('albumId');

        albums.forEach(m => {
          const countReq = index.count(m.id);
          countReq.onsuccess = () => {
            const count = countReq.result;
            const badge = document.getElementById(`count-badge-${m.id}`);
            if (badge) {
              badge.textContent = count > 0 ? `📁 ${count} uploads` : '📸 Tap to add memories';
            }
          };
        });
      };
      req.onerror = () => {}; // Graceful fail if no DB yet
    }

    // ===== SEARCH FILTER =====
    function filterAlbums(q) {
      const query = q.toLowerCase().trim();
      const filtered = query ? MEMORIES.filter(m => m.title.toLowerCase().includes(query)) : MEMORIES;
      renderAlbumsGrid(filtered);
    }

    // ===== OPEN MEMORY MODAL =====
    function openMemory(id) {
      currentMemoryId = id;
      const m = MEMORIES.find(x => x.id === id);
      if (!m) return;
      document.getElementById('modalPoster').src = m.poster;
      document.getElementById('modalTitle').textContent = m.title;
      document.getElementById('modalYear').textContent = m.year;
      document.getElementById('modalDuration').textContent = m.duration;
      document.getElementById('modalDesc').textContent = m.description;
      document.getElementById('modalTags').innerHTML = m.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
      document.getElementById('modalPlayBtn').onclick = () => { closeModal(); playMemory(id); };
      document.getElementById('memoryModal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('memoryModal').classList.remove('active');
    }

    function toggleFavorite() {
      if (currentMemoryId === null) return;
      const idx = favorites.indexOf(currentMemoryId);
      if (idx === -1) { favorites.push(currentMemoryId); document.getElementById('modalListBtn').textContent = '✓ In My List'; }
      else { favorites.splice(idx, 1); document.getElementById('modalListBtn').textContent = '+ My List'; }
      localStorage.setItem('hf_favorites', JSON.stringify(favorites));
    }

    // ===== SURPRISE MODAL =====
    function showSurprise(cb) {
      const quotes = ['"Some moments are too beautiful to forget." ✨', '"The best memories are the ones we never planned." 🌟', '"Time flies, but memories last forever." 💛'];
      const modal = document.getElementById('surpriseModal');
      const content = document.getElementById('surpriseContent');
      modal.classList.add('active');
      content.innerHTML = `<div style="font-size:5rem">🎉</div><h2 style="font-family:var(--font-display);font-size:2.5rem;color:var(--hf-red);margin-top:1rem">SHOWTIME!</h2><p style="color:var(--hf-muted);margin-top:0.5rem">Get ready for something special...</p>`;
      launchConfetti();
      setTimeout(() => { modal.classList.remove('active'); setTimeout(cb, 200); }, 2200);
    }

    function launchConfetti() {
      const colors = ['#e50914','#f5c518','#fff','#46d369'];
      for (let i = 0; i < 50; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${Math.random()*10+5}px;height:${Math.random()*10+5}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    // ===== PLAYER =====
    function playMemory(id, startIndex = 0) {
      const m = MEMORIES.find(x => x.id === id);
      if (!m) return;
      showSurprise(() => {
        playerState.memory = m;
        playerState.slides = m.slides;
        playerState.index = startIndex;
        playerState.playing = true;
        document.getElementById('playerTitle').textContent = m.title;
        document.getElementById('playerOverlay').style.display = 'block';
        gsap.fromTo('#playerOverlay', { opacity: 0 }, { opacity: 1, duration: 0.6 });
        renderPlayerSlide();
        startPlayerInterval();
        tryPlayMusic();
      });
    }

    function renderPlayerSlide() {
      const slide = playerState.slides[playerState.index];
      const img = document.getElementById('playerImg');
      const vid = document.getElementById('playerVid');
      const caption = document.getElementById('slideCaption');
      const bg = document.getElementById('playerBg');
      gsap.to('#playerOverlay .player-content', { opacity: 0, duration: 0.3, onComplete: () => {
        caption.textContent = slide.caption || '';
        if (slide.type === 'video') {
          img.style.display = 'none';
          vid.style.display = 'block';
          vid.src = slide.src;
          vid.muted = true;
          vid.play().catch(() => {});
          vid.onended = () => { if (playerState.playing) nextSlide(); };
          bg.style.backgroundImage = `url('${playerState.memory.poster}')`;
        } else {
          vid.style.display = 'none';
          vid.pause();
          img.style.display = 'block';
          img.src = slide.src;
          bg.style.backgroundImage = `url('${slide.src}')`;
        }
        gsap.fromTo('#playerOverlay .player-content', { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.6, ease: 'power2.out' });
      }});
      const total = playerState.slides.length;
      document.getElementById('playerFill').style.width = (((playerState.index + 1) / total) * 100) + '%';
      document.getElementById('playerCounter').textContent = `${playerState.index + 1} / ${total}`;
    }

    function startPlayerInterval() {
      clearInterval(playerState.interval);
      if (playerState.playing) {
        playerState.interval = setInterval(() => {
          const s = playerState.slides[playerState.index];
          if (s.type !== 'video') {
            if (playerState.index < playerState.slides.length - 1) { playerState.index++; renderPlayerSlide(); }
            else clearInterval(playerState.interval);
          }
        }, 5000);
      }
    }

    function togglePlay() {
      playerState.playing = !playerState.playing;
      document.getElementById('playPauseBtn').textContent = playerState.playing ? '⏸' : '▶';
      if (playerState.playing) { startPlayerInterval(); tryPlayMusic(); }
      else { clearInterval(playerState.interval); document.getElementById('bgMusic').pause(); }
    }
    function nextSlide() {
      clearInterval(playerState.interval);
      if (playerState.index < playerState.slides.length - 1) { playerState.index++; renderPlayerSlide(); startPlayerInterval(); }
    }
    function prevSlide() {
      clearInterval(playerState.interval);
      if (playerState.index > 0) { playerState.index--; renderPlayerSlide(); startPlayerInterval(); }
    }
    function exitPlayer() {
      clearInterval(playerState.interval);
      const vid = document.getElementById('playerVid');
      if (vid) { vid.pause(); vid.src = ''; }
      gsap.to('#playerOverlay', { opacity: 0, duration: 0.4, onComplete: () => {
        document.getElementById('playerOverlay').style.display = 'none';
        document.getElementById('bgMusic').pause();
        playerState.playing = false;
      }});
    }
    function setVolume(val) { document.getElementById('bgMusic').volume = parseFloat(val); }
    function tryPlayMusic() {
      const a = document.getElementById('bgMusic');
      a.volume = 0.4;
      a.play().catch(() => {});
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      const pv = document.getElementById('playerOverlay').style.display !== 'none';
      if (pv) {
        if (e.key === 'ArrowRight') nextSlide();
        if (e.key === 'ArrowLeft') prevSlide();
        if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        if (e.key === 'Escape') exitPlayer();
      }
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>

</html>
